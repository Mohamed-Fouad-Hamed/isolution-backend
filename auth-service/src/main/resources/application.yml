server:
  port: 8081

spring:

  threads:
    virtual:
      enabled: true

  main:
    allow-bean-definition-overriding: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  application:
    name: auth-service

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms

  cloud:
    config:
      uri: http://config-service:8888
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 2000

  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/authdb
    username: auth_user
    password: auth_pass
    driverClassName: org.postgresql.Driver
    hikari:
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000


  liquibase:
    change-log: liquibase/db.changelog-master.xml
    enabled: true
    drop-first: false
    default-schema: public

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: localhost:9092

security:
  jwt:
    filter-exclude-urls:
      - /authenticate
      - /login
      - /refresh
      - /ping
      - /jwks.json
      - /user-info
      - /display-name
      - /user-register
      - /verify-register
      - /new-otp
      - /verify-reset-password
      - /forgot
      - /update-password
    jwks-ttl: 600
    clock-skew-seconds: 604800
    jwks-url: http://localhost:8081/jwks.json
    redis-enabled: true
    refresh-ttl-days: 30
    access-ttl-seconds: 900
    issuer: "auth-service"
    private-key: keys/ecdsa-private.pem
    public-key: keys/ecdsa-public.pem
    access-token-minutes: 15
    refresh-token-days: 30

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

