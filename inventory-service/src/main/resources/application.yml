server:
  port: 8084

spring:

  threads:
    virtual:
      enabled: true

  application:
    name: inventory-service

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms

  datasource:
    platform: postgres
    url: jdbc:postgresql://postgres-inventory:5432/inventorydb
    username: inventory_user
    password: inventory_pass
    driverClassName: org.postgresql.Driver
    hikari:
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}


security:
  jwt:
    filter-exclude-urls:
      - /api/auth/jwks.json
    jwks-ttl: 600
    clock-skew-seconds: 604800
    jwks-url: http://localhost:8081/api/auth/jwks.json
    redis-enabled: true

    issuer: "inventory-service"
    public-key: keys/ecdsa-public.pem
    private-key: ""
    access-token-minutes: 15
    refresh-token-days: 30
    exclude:
      - /health
      - /actuator/**
      - /products/public/**
      - /docs/**
      - /swagger-ui/**


eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
