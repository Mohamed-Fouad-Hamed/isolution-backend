name: isolution-dev

services:
  # =============================
  # ⚙️ Config Service
  # =============================
  config-service:
    build:
      context: .
      dockerfile: ./config-service/Dockerfile
      args:
        MODULE: config-service
        MODE: dev
    container_name: config-service
    ports:
      - "8888:8888"
    volumes:
      - ./config-service:/app/config-service
      - ./config-repo:/app/config-repo
      - ~/.m2:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_LIVERELOAD_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 25s
    networks:
      - isolution-net

  # =============================
  # 🔍 Discovery Service
  # =============================
  discovery-service:
    build:
      context: .
      dockerfile: ./discovery-service/Dockerfile
      args:
        MODULE: discovery-service
        MODE: dev
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    volumes:
      - ./discovery-service:/app/discovery-service
      - ~/.m2:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_LIVERELOAD_ENABLED=true
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 25s
    networks:
      - isolution-net

  # =============================
  # 🗃️ Databases
  # =============================
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - isolution-net

  postgres-billing:
    image: postgres:16
    container_name: postgres-billing
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billingdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - isolution-net

  # =============================
  # 🦜 Kafka + Zookeeper
  # =============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - isolution-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - isolution-net
  #==============================
  #  Redis
  #==============================
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6379' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - isolution-net

  # =============================
  # 👤 Auth Service
  # =============================
  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
      args:
        MODULE: auth-service
        MODE: dev
    container_name: auth-service
    ports:
      - "8081:8081"
      - "5005:5005"

    volumes:
      - ./auth-service:/app/auth-service
      - ~/.m2:/root/.m2         # cache

    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/authdb
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_PROFILES_ACTIVE: dev
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"

    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 25s

    networks:
      - isolution-net

  # =============================
  # 💰 Billing Service
  # =============================
  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
      args:
        MODULE: billing-service
        MODE: dev
    container_name: billing-service
    ports:
      - "8082:8082"
      - "5006:5005"
    volumes:
      - ./billing-service:/app/billing-service
      - ~/.m2:/root/.m2
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-billing:5432/billingdb
      - SPRING_DATASOURCE_USERNAME=billing_user
      - SPRING_DATASOURCE_PASSWORD=billing_pass
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=dev
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_LIVERELOAD_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 25s
    networks:
      - isolution-net

  # =============================
  # 🔑 Gateway Service
  # =============================
  gateway-service:
    build:
      context: .
      dockerfile: ./gateway-service/Dockerfile
      args:
        MODULE: gateway-service
        MODE: dev
    container_name: gateway-service
    ports:
      - "8080:8080"
      - "5007:5005"
    volumes:
      - ./gateway-service:/app/gateway-service
      - ~/.m2:/root/.m2
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=dev
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_LIVERELOAD_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - isolution-net

# =============================
# 🌐 Network
# =============================
networks:
  isolution-net:
    name: isolution-net
    driver: bridge
