name: isolution-prod

services:
  config-service:
    build:
      context: .
      dockerfile: ./config-service/Dockerfile
      args:
        MODULE: config-service
        MODE: prod
    container_name: config-service
    ports:
      - "8888:8888"
    networks:
      - isolution-net

  discovery-service:
    build:
      context: .
      dockerfile: ./discovery-service/Dockerfile
      args:
        MODULE: discovery-service
        MODE: prod
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      - config-service
    networks:
      - isolution-net


  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    networks:
      - isolution-net

  postgres-billing:
    image: postgres:16
    container_name: postgres-billing
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    networks:
      - isolution-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - isolution-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - isolution-net
  #==============================
  #  Redis
  #==============================
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6379' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - isolution-net

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
      args:
        MODULE: auth-service
        MODE: prod
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isolution-net

  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
      args:
        MODULE: billing-service
        MODE: prod
    container_name: billing-service
    ports:
      - "8082:8082"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isolution-net

  gateway-service:
    build:
      context: .
      dockerfile: ./gateway-service/Dockerfile
      args:
        MODULE: gateway-service
        MODE: prod
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isolution-net


networks:
  isolution-net:
    name: isolution-net
    driver: bridge
